<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前世の職業診断</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #e94560; display: flex; justify-content: center; padding: 20px; }
        #app { background: #16213e; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #fff; }
        .q-text { font-size: 1.2rem; margin-bottom: 20px; color: #fff; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #0f3460; color: #fff; border: 2px solid #e94560; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e94560; }
        #result { display: none; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-area">
        <h1>前世の職業診断</h1>
        <div id="question" class="q-text"></div>
        <div id="options"></div>
    </div>
    <div id="result">
        <h1>診断結果</h1>
        <h2 id="job-title" style="color:#fff;"></h2>
        <p id="job-desc"></p>
        <button onclick="location.reload()">もう一度診断する</button>
    </div>
</div>

<script>
    const questions = [
        { q: "休日の理想の過ごし方は？", o: ["森でひっそり読書", "賑やかな市場を散策", "新しい道具の発明", "仲間と盛大な宴会"] },
        { q: "一番惹かれるものは？", o: ["古い地図", "きらびやかな宝石", "未知の薬草", "研ぎ澄まされた剣"] },
        { q: "困難に直面した時の反応は？", o: ["直感で回避", "論理で解決", "力で突破", "誰かに相談"] },
        { q: "宝物を隠すならどこ？", o: ["高い塔の頂上", "深い地底の隠れ家", "海の中の箱", "思い出の場所の土の中"] },
        { q: "人生のモットーは？", o: ["自由に生きる", "知識を極める", "誰かに守る", "世界を変える"] }
    ];
    let step = 0, score = 0;
    function showQuestion() {
        if(step < questions.length) {
            document.getElementById('question').innerText = questions[step].q;
            const optArea = document.getElementById('options');
            optArea.innerHTML = '';
            questions[step].o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => { score += i; step++; showQuestion(); };
                optArea.appendChild(btn);
            });
        } else { showResult(); }
    }
    function showResult() {
        document.getElementById('quiz-area').classList.add('hidden');
        const res = document.getElementById('result');
        res.style.display = 'block';
        const jobs = [
            {t: "星詠みの魔導師", d: "あなたはかつて空を読み、未来を予言していました。現代でも直感力が鋭く、周囲を正しい道へ導く力があります。"},
            {t: "王国の錬金術師", d: "あなたは石を金に変える夢を追っていました。失敗を恐れない探究心が、今もあなたの最大の武器です。"},
            {t: "伝説の吟遊詩人", d: "あなたの奏でる音は国を癒やしました。言葉の力で人を動かす才能が、あなたの天職です。"},
            {t: "辺境の守護騎士", d: "あなたは誇り高い騎士でした。その義理堅さと誠実さは、現代でも周囲の強い信頼を集めています。"}
        ];
        const r = jobs[Math.min(Math.floor(score / 5), jobs.length - 1)];
        document.getElementById('job-title').innerText = r.t;
        document.getElementById('job-desc').innerText = r.d;
    }
    showQuestion();
</script>
</body>
</html>
