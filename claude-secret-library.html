<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 前世の職業診断</title>
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #13132b;
    --card: #1a1a35;
    --accent: #c8a4ff;
    --accent2: #7dd4fc;
    --accent3: #f0c4ff;
    --gold: #e8c87a;
    --text: #e8e0f5;
    --muted: #8880aa;
    --radius: 18px;
    --glow: 0 0 24px rgba(200,164,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* 星空背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(100,60,200,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(50,100,200,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 10%, rgba(200,100,255,0.1) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(1); }
    to   { opacity: 0.9; transform: scale(1.3); }
  }

  /* メインコンテナ */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 24px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ========== SCREEN SYSTEM ========== */
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 24px; }

  /* ========== TOP SCREEN ========== */
  .top-moon {
    font-size: 72px;
    line-height: 1;
    margin-top: 16px;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(200,164,255,0.7));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .top-badge {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid rgba(200,164,255,0.35);
    padding: 4px 14px;
    border-radius: 100px;
    margin-top: 8px;
  }

  .top-title {
    font-size: clamp(22px, 6vw, 28px);
    font-weight: 700;
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.05em;
    color: #fff;
    text-shadow: 0 0 30px rgba(200,164,255,0.5);
  }

  .top-title span {
    color: var(--accent);
  }

  .top-desc {
    font-size: 13px;
    line-height: 1.9;
    text-align: center;
    color: var(--muted);
    max-width: 320px;
  }

  .top-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    margin: 4px 0;
  }

  /* ========== BUTTON ========== */
  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 16px 48px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(124,58,237,0.5), var(--glow);
    transition: transform 0.15s, box-shadow 0.15s;
    width: 100%;
    max-width: 280px;
  }

  .btn-primary:active {
    transform: scale(0.97);
    box-shadow: 0 2px 12px rgba(124,58,237,0.4);
  }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(200,164,255,0.4);
    border-radius: 100px;
    padding: 13px 40px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.15s, transform 0.15s;
    width: 100%;
    max-width: 280px;
  }

  .btn-secondary:active {
    background: rgba(200,164,255,0.08);
    transform: scale(0.97);
  }

  /* ========== QUESTION SCREEN ========== */
  .q-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .q-progress-wrap {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border-radius: 100px;
    height: 5px;
    overflow: hidden;
  }

  .q-progress-bar {
    height: 100%;
    background: linear-gradient(to right, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .q-num {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .q-icon {
    font-size: 52px;
    line-height: 1;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(200,164,255,0.5));
    margin: 4px 0;
  }

  .q-text {
    font-size: clamp(16px, 4.5vw, 20px);
    font-weight: 700;
    text-align: center;
    line-height: 1.55;
    letter-spacing: 0.04em;
    color: #fff;
    min-height: 64px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .choice-btn {
    background: var(--card);
    border: 1px solid rgba(200,164,255,0.2);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    -webkit-tap-highlight-color: transparent;
  }

  .choice-btn:active {
    transform: scale(0.985);
    border-color: var(--accent);
    background: rgba(200,164,255,0.1);
    box-shadow: 0 0 16px rgba(200,164,255,0.2);
  }

  .choice-letter {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(200,164,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0;
    margin-top: 1px;
  }

  /* ========== LOADING SCREEN ========== */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 40px 0;
  }

  .loading-orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #c8a4ff, #4f46e5);
    box-shadow: 0 0 40px rgba(200,164,255,0.6), 0 0 80px rgba(79,70,229,0.3);
    animation: pulse-orb 1.6s ease-in-out infinite;
  }

  @keyframes pulse-orb {
    0%, 100% { transform: scale(1);   box-shadow: 0 0 40px rgba(200,164,255,0.6), 0 0 80px rgba(79,70,229,0.3); }
    50%       { transform: scale(1.1); box-shadow: 0 0 60px rgba(200,164,255,0.9), 0 0 120px rgba(79,70,229,0.5); }
  }

  .loading-text {
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.15em;
    animation: fade-text 1.6s ease-in-out infinite;
  }

  @keyframes fade-text {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 1; }
  }

  /* ========== RESULT SCREEN ========== */
  .result-card {
    width: 100%;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(200,164,255,0.25);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), var(--glow);
  }

  .result-header {
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .result-header::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.15;
  }

  .result-era {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px;
  }

  .result-emoji {
    font-size: 64px;
    line-height: 1;
    margin: 8px 0;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
  }

  .result-title {
    font-size: clamp(20px, 5.5vw, 26px);
    font-weight: 800;
    letter-spacing: 0.05em;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    line-height: 1.3;
  }

  .result-subtitle {
    font-size: 12px;
    margin-top: 6px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.1em;
  }

  .result-body {
    background: var(--card);
    padding: 24px 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .result-desc {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
  }

  .result-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .trait-tag {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid rgba(200,164,255,0.3);
    color: var(--accent);
    background: rgba(200,164,255,0.07);
    letter-spacing: 0.06em;
  }

  .result-message {
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    background: rgba(200,164,255,0.05);
    border-radius: 0 12px 12px 0;
    font-size: 13px;
    line-height: 1.85;
    color: var(--muted);
    font-style: italic;
  }

  .share-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .share-label {
    font-size: 11px;
    text-align: center;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .btn-share {
    background: linear-gradient(135deg, #1a1a2e, #2d2d4e);
    color: #fff;
    border: 1px solid rgba(200,164,255,0.3);
    border-radius: 100px;
    padding: 15px 32px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    transition: transform 0.15s, background 0.15s;
    letter-spacing: 0.08em;
  }

  .btn-share:active {
    transform: scale(0.97);
    background: rgba(200,164,255,0.12);
  }

  .footer-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
    margin-top: 8px;
  }

  /* アニメーション */
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .screen.active > * {
    animation: slide-up 0.4s ease both;
  }

  .screen.active > *:nth-child(2) { animation-delay: 0.05s; }
  .screen.active > *:nth-child(3) { animation-delay: 0.10s; }
  .screen.active > *:nth-child(4) { animation-delay: 0.15s; }
  .screen.active > *:nth-child(5) { animation-delay: 0.20s; }

  /* コピー通知 */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(200,164,255,0.95);
    color: #1a0a35;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 24px;
    border-radius: 100px;
    z-index: 100;
    transition: transform 0.3s ease;
    white-space: nowrap;
    letter-spacing: 0.08em;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<!-- メインコンテナ -->
<div class="container">

  <!-- ===== SCREEN 0: TOP ===== -->
  <div class="screen active" id="screen-top">
    <div class="top-moon">🌙</div>
    <div class="top-badge">✦ Soul Reading ✦</div>

    <div class="top-divider"></div>
    <p class="top-desc">5つの問いに答えるだけで、<br>あなたの魂が歩んできた<br>前世の記憶が明かされます。</p>
    <button class="btn-primary" onclick="startQuiz()">✦ 診断をはじめる</button>
    <p class="footer-note">※占いではなく「魂の創作診断」です。<br>楽しんでいただくためのエンタメです🌙</p>
  </div>

  <!-- ===== SCREEN 1: QUESTION ===== -->
  <div class="screen" id="screen-q">
    <div class="q-header">
      <div class="q-progress-wrap">
        <div class="q-progress-bar" id="progress-bar" style="width:0%"></div>
      </div>

    <div class="q-icon" id="q-icon">🌙</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- ===== SCREEN 2: LOADING ===== -->
  <div class="screen" id="screen-loading">
    <div class="loading-wrap">
      <div class="loading-orb"></div>
      <div class="loading-text" id="loading-text">魂の記憶を読み解いています…</div>
    </div>
  </div>

  <!-- ===== SCREEN 3: RESULT ===== -->
  <div class="screen" id="screen-result">
    <div class="result-card" id="result-card">
      <div class="result-header" id="result-header">
        <div class="result-era" id="result-era"></div>
        <div class="result-emoji" id="result-emoji"></div>
        <div class="result-title" id="result-title"></div>
        <div class="result-subtitle" id="result-subtitle"></div>

        <div class="result-desc" id="result-desc"></div>
        <div class="result-traits" id="result-traits"></div>
        <div class="result-message" id="result-message"></div>
      </div>
    </div>
    <div class="share-section">
      <div class="share-label">✦ 結果をシェアする</div>
      <button class="btn-share" onclick="copyResult()">📋 テキストをコピーしてスレッズへ</button>
      <button class="btn-secondary" onclick="restartQuiz()">🔄 もう一度診断する</button>
    </div>
    <p class="footer-note">「当たってる！」と思ったらシェアしてね🌙<br>#前世の職業診断</p>
  </div>

</div>

<!-- コピー通知 -->
<div class="toast" id="toast">コピーしました ✦</div>

for (let i = 0; i < 70; i++) {
  const s = document.createElement('div');

    left:${Math.random()*100}%;
    --d:${(Math.random()*3+2).toFixed(1)}s;
    --delay:${(Math.random()*4).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

      { text: '「あなたのおかげで、救われました」', scores: [0,0,0,2,1,1] },
    ]
  }
];

// ===== ゲーム状態 =====
let currentQ = 0;
let scores = [0, 0, 0, 0, 0, 0];
let currentResult = null;

// ===== ユーティリティ =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startQuiz() {
  currentQ = 0;
  scores = [0, 0, 0, 0, 0, 0];
  loadQuestion();
  showScreen('screen-q');
}

function restartQuiz() {
  startQuiz();
}

function loadQuestion() {
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('q-num').textContent = `Question ${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-icon').textContent = q.icon;
  document.getElementById('q-text').textContent = q.text;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${c.text}</span>`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(idx) {
  const q = questions[currentQ];
  q.choices[idx].scores.forEach((s, i) => { scores[i] += s; });
  currentQ++;

  if (currentQ >= questions.length) {
    showScreen('screen-loading');
    animateLoading();
    setTimeout(showResult, 2800);
  } else {
    loadQuestion();
  }
}

function animateLoading() {
  const msgs = [
    '魂の記憶を読み解いています…',
    '前世のかけらを集めています…',
    'あなたの魂の波長を確認中…',
    '時空の記録が開かれています…',
  ];
  let mi = 0;
  const el = document.getElementById('loading-text');
  const iv = setInterval(() => {
    mi = (mi + 1) % msgs.length;
    el.textContent = msgs[mi];
  }, 700);
  setTimeout(() => clearInterval(iv), 2700);
}

function showResult() {
  const maxIdx = scores.indexOf(Math.max(...scores));
  currentResult = results[maxIdx];
  const r = currentResult;

  document.getElementById('result-era').textContent = r.era;
  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-subtitle').textContent = r.subtitle;
  document.getElementById('result-desc').textContent = r.desc;
  document.getElementById('result-message').textContent = r.message;

  const header = document.getElementById('result-header');
  header.style.background = r.gradient;

  const traitsEl = document.getElementById('result-traits');
  traitsEl.innerHTML = r.traits.map(t => `<span class="trait-tag">${t}</span>`).join('');

  showScreen('screen-result');
}

function copyResult() {
  if (!currentResult) return;
  const text = currentResult.shareText;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }).catch(() => {
    // フォールバック
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  });
}
