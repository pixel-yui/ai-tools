<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの心の中にある秘密の部屋診断</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background:
      radial-gradient(circle at top left, rgba(255, 230, 245, 0.9), transparent 35%),
      radial-gradient(circle at bottom right, rgba(220, 235, 255, 0.9), transparent 40%),
      linear-gradient(135deg, #f8f0ff, #eef7ff);
    color: #44384f;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 560px;
  }

  .card {
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 28px;
    padding: 26px;
    box-shadow: 0 18px 45px rgba(120, 90, 150, 0.18);
    backdrop-filter: blur(8px);
  }

  .badge {
    width: fit-content;
    margin: 0 auto 14px;
    padding: 7px 14px;
    border-radius: 999px;
    background: #f0e5ff;
    color: #7d5bb8;
    font-size: 13px;
    font-weight: bold;
  }

  h1 {
    margin: 0;
    text-align: center;
    font-size: 26px;
    line-height: 1.45;
    letter-spacing: 0.03em;
  }

  .lead {
    margin: 16px 0 22px;
    text-align: center;
    line-height: 1.8;
    font-size: 14px;
    color: #6b5e76;
  }

  .progress {
    height: 8px;
    background: #eee8f8;
    border-radius: 999px;
    overflow: hidden;
    margin: 20px 0 24px;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #c9a7ff, #ffbfd9);
    transition: width 0.3s ease;
  }

  .question {
    font-weight: bold;
    font-size: 18px;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .answer {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 15px 16px;
    margin: 8px 0;
    background: #f4ecff;
    color: #44384f;
    font-size: 15px;
    line-height: 1.5;
    text-align: left;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }

  .answer:hover {
    background: #eadcff;
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(125, 91, 184, 0.12);
  }

  .result-title {
    text-align: center;
    font-size: 28px;
    color: #7d5bb8;
    margin: 10px 0 12px;
  }

  .result-sub {
    text-align: center;
    font-weight: bold;
    color: #9a6f91;
    margin-bottom: 18px;
  }

  .result-box {
    background: #fbf8ff;
    border-radius: 20px;
    padding: 20px;
    line-height: 1.9;
    font-size: 15px;
  }

  .keyword {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 18px 0;
  }

  .keyword span {
    background: #fff0f7;
    color: #8d5573;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px;
  }

  .main-button {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 15px;
    margin-top: 12px;
    background: linear-gradient(90deg, #d7c2ff, #ffc9dd);
    color: #44384f;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }

  .sub-button {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 14px;
    margin-top: 10px;
    background: #f1edf7;
    color: #44384f;
    font-size: 15px;
    cursor: pointer;
  }

  .small {
    text-align: center;
    font-size: 12px;
    color: #83778b;
    margin-top: 16px;
    line-height: 1.6;
  }

  .hidden {
    display: none;
  }
</style>
</head>
<body>
  <main class="app">
    <section class="card" id="startScreen">
      <div class="badge">Threadsでシェアしたくなる診断</div>
      <h1>あなたの心の中にある<br>秘密の部屋診断</h1>
      <p class="lead">
        5つの質問に答えるだけ。<br>
        あなたの内側に眠る「秘密の部屋」を見つけます。
      </p>
      <button class="main-button" onclick="startQuiz()">診断をはじめる</button>
      <p class="small">※遊びとして楽しむ創作診断です。</p>
    </section>

    <section class="card hidden" id="quizScreen">
      <div class="badge" id="countText">1 / 5</div>
      <div class="progress"><div class="bar" id="progressBar"></div></div>
      <div class="question" id="questionText"></div>
      <div id="answerArea"></div>
    </section>

    <section class="card hidden" id="resultScreen">
      <div class="badge">診断結果</div>
      <h1>あなたの秘密の部屋は…</h1>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-sub" id="resultSub"></div>
      <div class="keyword" id="keywordArea"></div>
      <div class="result-box" id="resultText"></div>
      <button class="main-button" onclick="copyResult()">結果をコピーする</button>
      <button class="sub-button" onclick="restartQuiz()">もう一度診断する</button>
      <p class="small">コピーした結果をThreadsなどに貼って楽しめます。</p>
    </section>
  </main>

<script>
const questions = [
  {
    text: "静かな夜、ふと行きたくなる場所は？",
    answers: [
      { text: "古い本が並ぶ小さな図書館", type: "library" },
      { text: "星空を見渡せる高い塔", type: "tower" },
      { text: "雨音が聞こえる作業部屋", type: "atelier" },
      { text: "花の香りがする温室", type: "greenhouse" }
    ]
  },
  {
    text: "あなたが大切にしたい時間は？",
    answers: [
      { text: "ひとりで深く考える時間", type: "library" },
      { text: "未来のことを想像する時間", type: "tower" },
      { text: "何かを作ったり書いたりする時間", type: "atelier" },
      { text: "誰かとゆっくり心を通わせる時間", type: "greenhouse" }
    ]
  },
  {
    text: "心が惹かれる言葉を選ぶなら？",
    answers: [
      { text: "記憶", type: "library" },
      { text: "希望", type: "tower" },
      { text: "感性", type: "atelier" },
      { text: "ぬくもり", type: "greenhouse" }
    ]
  },
  {
    text: "あなたの中にある強さは？",
    answers: [
      { text: "物事を深く見つめ続ける力", type: "library" },
      { text: "新しい可能性を探しに行く力", type: "tower" },
      { text: "心の揺れを形にする力", type: "atelier" },
      { text: "人や物事をやさしく育てる力", type: "greenhouse" }
    ]
  },
  {
    text: "最後に、好きな光は？",
    answers: [
      { text: "月明かり", type: "library" },
      { text: "星明かり", type: "tower" },
      { text: "窓辺の淡い光", type: "atelier" },
      { text: "朝のやわらかな光", type: "greenhouse" }
    ]
  }
];

const results = {
  library: {
    title: "月光図書館",
    sub: "静かな知性と、言葉を集める人",
    keywords: ["記憶", "探究", "言葉", "静けさ"],
    text: "あなたの心の中には、月明かりに照らされた静かな図書館があります。そこには、これまで感じてきたこと、学んできたこと、忘れたくない言葉が本のように並んでいます。あなたは急がず、比べず、自分のペースで知恵を育てる人。誰にも見せていない物語を、心の奥にたくさん持っています。"
  },
  tower: {
    title: "星見の塔",
    sub: "未来を見つめる、希望の観測者",
    keywords: ["未来", "希望", "好奇心", "発見"],
    text: "あなたの心の中には、遠くの星まで見渡せる高い塔があります。まだ知らない世界、新しい可能性、これから出会う景色に心が向かう人です。時々不安になることがあっても、あなたの中には『もっと先を見たい』という光があります。未来を想像する力が、あなたの道しるべです。"
  },
  atelier: {
    title: "雨音のアトリエ",
    sub: "感情を作品に変える、静かな創作者",
    keywords: ["感性", "創作", "雨音", "余白"],
    text: "あなたの心の中には、雨音がやさしく響くアトリエがあります。小さな違和感、きれいだと思った瞬間、言葉にならない気持ちを大切にできる人です。あなたは感情をただ流すのではなく、絵や言葉やアイデアに変えていけるタイプ。静かな時間の中で、本当の魅力が育っていきます。"
  },
  greenhouse: {
    title: "花の温室",
    sub: "心をあたためる、やさしい育て手",
    keywords: ["癒し", "ぬくもり", "成長", "安心感"],
    text: "あなたの心の中には、やわらかな光に包まれた花の温室があります。人や物事が少しずつ育っていく過程を大切にできる人です。あなたの存在には、周りの心をほっとゆるめる力があります。強く押し出すよりも、あたたかく包み込むことで、世界にやさしい変化を起こしていくタイプです。"
  }
};

let currentQuestion = 0;
let scores = {};
let finalType = "";

function startQuiz() {
  scores = { library: 0, tower: 0, atelier: 0, greenhouse: 0 };
  currentQuestion = 0;
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById("countText").textContent = `${currentQuestion + 1} / ${questions.length}`;
  document.getElementById("progressBar").style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
  document.getElementById("questionText").textContent = q.text;

  const answerArea = document.getElementById("answerArea");
  answerArea.innerHTML = "";

  q.answers.forEach(answer => {
    const button = document.createElement("button");
    button.className = "answer";
    button.textContent = answer.text;
    button.onclick = () => chooseAnswer(answer.type);
    answerArea.appendChild(button);
  });
}

function chooseAnswer(type) {
  scores[type] += 1;
  currentQuestion += 1;

  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  finalType = Object.keys(scores).reduce((top, key) => {
    return scores[key] > scores[top] ? key : top;
  });

  const result = results[finalType];

  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  document.getElementById("resultTitle").textContent = result.title;
  document.getElementById("resultSub").textContent = result.sub;
  document.getElementById("resultText").textContent = result.text;

  const keywordArea = document.getElementById("keywordArea");
  keywordArea.innerHTML = "";
  result.keywords.forEach(keyword => {
    const span = document.createElement("span");
    span.textContent = keyword;
    keywordArea.appendChild(span);
  });
}

function copyResult() {
  const result = results[finalType];
  const shareText = `私の心の中にある秘密の部屋は「${result.title}」でした。\n${result.sub}\n#秘密の部屋診断`;

  navigator.clipboard.writeText(shareText).then(() => {
    alert("結果をコピーしました！");
  }).catch(() => {
    alert("コピーに失敗しました。結果を手動で選択してコピーしてください。");
  });
}

function restartQuiz() {
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}
</script>
</body>
</html>
